services:
  postgres:
    image: postgres:16-alpine
    container_name: flow_postgres
    environment:
      POSTGRES_USER: flow_user
      POSTGRES_PASSWORD: flow_password
      POSTGRES_DB: flow_process
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flow_network

  redis:
    image: redis:7-alpine
    container_name: flow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flow_network

volumes:
  postgres_data:
  redis_data:

networks:
  flow_network:
    driver: bridge